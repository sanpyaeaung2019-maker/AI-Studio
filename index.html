<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scene Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap');
        
        body {
            font-family: 'Padauk', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.8); }

        .loader {
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-left-color: #6366f1;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }

        .loader-small {
            border: 3px solid rgba(16, 185, 129, 0.2);
            border-left-color: #10b981;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection:bg-indigo-500/30">

                </div>

            </div>
            
            <div class="hidden md:flex items-center gap-2" id="stepper">

    </header>

            <div class="flex items-center gap-3">

    <script>
        const apiKey = "AIzaSyAoxCvpkUtvl7I6JdPbz77z3wRh6QxwPkU"; // API Key နေရာ

        const MALE_VOICES = [
            { id: 'Fenrir', name: 'ခန့်ညားသောအသံ (Fenrir)' },
            { id: 'Orus', name: 'တည်ကြည်သောအသံ (Orus)' },

            { id: 'Algieba', name: 'တက်ကြွသောအသံ (Algieba)' },
            { id: 'Rasalgethi', name: 'ပုံပြင်ပြောသူအသံ (Rasalgethi)' }
        ];

        const VIDEO_FORMATS = {
            tiktok: { width: 1080, height: 1920 },
            youtube: { width: 1920, height: 1080 },
            facebook: { width: 1080, height: 1080 }
        };

        const DURATIONS = {
            "short": { words: 300, scenes: 5 },

        const SFX_LIBRARY = {
            "none": { name: "အသံမပါ", url: "" },
            "dog_bark": { name: "ခွေးဟောင်သံ", url: "https://actions.google.com/sounds/v1/animals/dog_barking.ogg" },
            "wind": { name: "လေတိုက်သံ", url: "https://actions.google.com/sounds/v1/weather/strong_wind.ogg" },
            "glass_break": { name: "အိုးခွက်/မှန်ကွဲသံ", url: "https://actions.google.com/sounds/v1/impacts/glass_shatter.ogg" },
            "rain": { name: "မိုးရွာသံ", url: "https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg" },
            "thunder": { name: "မိုးခြိမ်းသံ", url: "https://actions.google.com/sounds/v1/weather/thunder_crack.ogg" },
            "footsteps": { name: "ခြေသံ", url: "https://actions.google.com/sounds/v1/foley/footsteps_on_leaves.ogg" },
            "birds": { name: "ငှက်အော်သံ", url: "https://actions.google.com/sounds/v1/animals/birds_forest_morning.ogg" },
            "door_creak": { name: "တံခါးဂျိသံ", url: "https://actions.google.com/sounds/v1/doors/creaking_wooden_door.ogg" },
            "explosion": { name: "ပေါက်ကွဲသံ", url: "https://actions.google.com/sounds/v1/explosions/explosion_large.ogg" },
            "water_splash": { name: "ရေပက်သံ", url: "https://actions.google.com/sounds/v1/water/water_splash.ogg" },
            "ghost": { name: "ခြောက်ခြားဖွယ်အသံ", url: "https://actions.google.com/sounds/v1/horror/ghost_whisper.ogg" },
            "magic": { name: "မှော်အသံ", url: "https://actions.google.com/sounds/v1/magic/wand_sparkle.ogg" },
            "crowd": { name: "လူအုပ်သံ", url: "https://actions.google.com/sounds/v1/crowds/light_crowd_noise.ogg" }
        };

        // State
        let currentStep = 1;
        let selectedVoiceId = MALE_VOICES[0].id;
        let scriptDataObj = null;
        let generatedScenes = [];
        let activePreviewAudio = null;
        let activePreviews = {}; 

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderVoiceOptions();
            updateStepper();
        });

        // Utils
        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        
        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('error-message').classList.remove('hidden');
            document.getElementById('error-message').classList.add('flex');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('error-message').classList.remove('flex');
        }
        function showLoading(viewId, text) {
            const el = document.getElementById(`loading-${viewId}`);
            if(el) el.style.display = 'flex';
            if(text) {
                const textEl = document.getElementById(`loading-text-${viewId}`);
                if(textEl) textEl.innerText = text;
            }
        }
        function hideLoading(viewId) {
            const el = document.getElementById(`loading-${viewId}`);
            if(el) el.style.display = 'none';
        }
        function showView(step) {
            currentStep = step;
            document.getElementById('view-1').classList.add('hidden');
            document.getElementById('view-2').classList.add('hidden');
            document.getElementById('view-3').classList.add('hidden');
            document.getElementById(`view-${step}`).classList.remove('hidden');
            updateStepper();
            hideError();
            if(activePreviewAudio) {
                activePreviewAudio.pause();
                activePreviewAudio = null;
            }
            // Stop any playing scene previews
            Object.keys(activePreviews).forEach(k => togglePreview(k));
        }

        function updateStepper() {
            const steps = [ { num: 1, text: "ဇာတ်ညွှန်းရေးရန်" }, { num: 2, text: "ပြင်ဆင်ရန်" }, { num: 3, text: "အခန်းများဒေါင်းလုဒ်" } ];
            const container = document.getElementById('stepper');
            container.innerHTML = '';
            
            steps.forEach((s, i) => {
                const isPast = currentStep > s.num;
                const isActive = currentStep >= s.num;
                let iconHtml = isPast ? `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>` : `<span>${s.num}.</span>`;
                
                container.innerHTML += `
                    <div class="flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-medium transition-colors ${isActive ? 'bg-indigo-500/10 text-indigo-300 border border-indigo-500/20' : 'text-slate-500'}">
                        ${iconHtml}
                        ${s.text}
                    </div>
                `;
                
                if (i < steps.length - 1) {
                    container.innerHTML += `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-700"><path d="m9 18 6-6-6-6"/></svg>`;
                }
            });
        }

        async function fetchWithRetry(url, options, maxRetries = 4) {
            const delays = [1000, 2000, 4000, 8000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await wait(delays[i]);
                }
            }
        }

        const pcmToWav = (pcmData, sampleRate = 24000) => {
            const numChannels = 1;
            const bitsPerSample = 16;
            const blockAlign = numChannels * (bitsPerSample / 8);
            const byteRate = sampleRate * blockAlign;
            const dataSize = pcmData.length * 2;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);

            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        };

        // API Calls
        async function generateScript(prompt, durationKey) {
            const durConfig = DURATIONS[durationKey];
            const sfxKeysList = Object.keys(SFX_LIBRARY).join(", ");
            const systemInstruction = `
                သင်သည် အလွန်ကျွမ်းကျင်သော ဇာတ်လမ်းပြောပြသူ (Storyteller) ဖြစ်သည်။ အသုံးပြုသူ၏ ဇာတ်လမ်းအကြမ်းကို အခြေခံ၍ လူများစိတ်ဝင်စားစွာ နားဆင်နိုင်မည့် ဇာတ်ညွှန်းတစ်ခု ရေးသားပေးပါ။
                လိုက်နာရမည့် အချက်များ:
                ၁။ အစ: "ယနေ့တင်ဆက်ပေးချင်တဲ့ ဇာတ်လမ်းလေးကတော့ [ဇာတ်လမ်းအမည်] ပါပဲခင်ဗျာ..." ဟု စတင်ပါ။
                ၂။ အဆုံး: "ကဲ... နောက်ထပ်လည်း စိတ်ဝင်စားစရာ ဇာတ်လမ်းလေးတွေကို စောင့်မျှော်အားပေးကြပါဦးခင်ဗျာ" ဟု အဆုံးသတ်ပါ။
                ၃။ အသံထွက်ဖတ်ပြရာတွင် ချောမွေ့စေရန် သဘာဝကျသော စကားပြောဟန် ဖြင့် ရေးသားပါ။
                ၄။ ဤဇာတ်လမ်းသည် စာလုံးရေ ${durConfig.words} လုံးခန့်ပြည့်အောင် ရေးသားပါ။
                ၅။ ဇာတ်လမ်းကို အပိုင်း (Scenes) ${durConfig.scenes} ပိုင်း တိတိကျကျ ခွဲပါ။
                ၆။ အခန်းတိုင်းအတွက် အသင့်တော်ဆုံး Sound Effect (SFX) ကို ရွေးချယ်ပါ။ ရွေးချယ်နိုင်သော SFX များ: [${sfxKeysList}]

                အောက်ပါ JSON format ဖြင့်သာ ပြန်ကြားပေးပါ:
                {
                "title": "ဇာတ်လမ်းအမည်",
                "scenes": [
                    { "narration": "စကားပြောမည့် မြန်မာစာသား", "image_prompt": "Cinematic, highly detailed English prompt for image generation", "sfx": "chosen_sfx_key" }
                ]
                }
            `;

            const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
                })
            });
            
            const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!text) throw new Error("ဇာတ်ညွှန်းဖန်တီးမှု မအောင်မြင်ပါ။");
            const cleanText = text.replace(/```json/gi, '').replace(/```/g, '').trim();
            return JSON.parse(cleanText);
        }

        async function generateImage(prompt) {
            const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    instances: { prompt: prompt + ", vivid lighting, highly detailed, cinematic shot, hyperrealistic" },
                    parameters: { sampleCount: 1 }
                })
            });
            if (!data?.predictions?.[0]?.bytesBase64Encoded) throw new Error("Image Failed");
            return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
        }

        async function generateAudio(text, voiceName) {
            const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voiceName } } }
                    }
                })
            });
            
            const inlineData = data?.candidates?.[0]?.content?.parts?.[0]?.inlineData;
            if (!inlineData || !inlineData.data) throw new Error("Audio Failed");
            
            const binaryString = atob(inlineData.data);
            const pcmData = new Int16Array(binaryString.length / 2);
            for (let i = 0; i < pcmData.length; i++) {
                pcmData[i] = (binaryString.charCodeAt(i * 2 + 1) << 8) | binaryString.charCodeAt(i * 2);
            }
            return URL.createObjectURL(pcmToWav(pcmData));
        }

        // Scene Video Generation
        async function generateSceneVideo(idx) {
            const formatKey = document.getElementById('formatSelect').value;
            const targetFormat = VIDEO_FORMATS[formatKey];
            const scene = generatedScenes[idx];
            
            if(activePreviews[idx]) togglePreview(idx);
            
            document.getElementById(`recording-overlay-${idx}`).classList.remove('hidden');
            document.getElementById(`recording-overlay-${idx}`).classList.add('flex');
            document.getElementById(`play-btn-${idx}`).classList.add('hidden');
            const actionBtn = document.getElementById(`action-btn-${idx}`);
            actionBtn.disabled = true;

            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = targetFormat.width > targetFormat.height ? 1280 : 720;
                canvas.height = targetFormat.width > targetFormat.height ? 720 : 1280;

                const img = new Image();
                img.crossOrigin = "anonymous";
                await new Promise(r => { img.onload = r; img.src = scene.image; });

                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const dest = audioCtx.createMediaStreamDestination();

                const voice = new Audio(scene.audio);
                voice.crossOrigin = "anonymous";
                await new Promise(r => { voice.oncanplaythrough = r; voice.load(); });
                const voiceSource = audioCtx.createMediaElementSource(voice);
                voiceSource.connect(dest);

                let sfx = null, sfxSource = null, sfxGain = null;
                if (scene.sfx_url) {
                    sfx = new Audio(scene.sfx_url);
                    sfx.crossOrigin = "anonymous";
                    try {
                        await new Promise((res) => { sfx.oncanplaythrough = res; sfx.onerror = res; sfx.src = scene.sfx_url; });
                        sfxSource = audioCtx.createMediaElementSource(sfx);
                        sfxGain = audioCtx.createGain();
                        sfxGain.gain.value = 0.3; 
                        sfxSource.connect(sfxGain);
                        sfxGain.connect(dest);
                    } catch(e) {}
                }

                const canvasStream = canvas.captureStream(30);
                const combinedStream = new MediaStream([...canvasStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
                const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
                
                const chunks = [];
                recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                const recordingPromise = new Promise(res => { recorder.onstop = () => res(new Blob(chunks, { type: 'video/webm' })); });

                recorder.start();
                voice.play();
                if (sfx) sfx.play().catch(e=>{});

                await new Promise(resolveScene => {
                    let isEnded = false;
                    voice.onended = () => { isEnded = true; };

                    const renderInterval = setInterval(() => {
                        if (isEnded) {
                            clearInterval(renderInterval);
                            if(sfx) {
                                sfxGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                                setTimeout(() => sfx.pause(), 1000);
                            }
                            resolveScene();
                            return;
                        }
                        
                        const progress = voice.currentTime / (voice.duration || 1);
                        
                        ctx.fillStyle = "#000";
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        const zoomAmount = 1 + (0.15 * progress); 
                        if (img) {
                            const baseScale = Math.max(canvas.width / img.width, canvas.height / img.height);
                            ctx.save();
                            ctx.translate(canvas.width/2, canvas.height/2);
                            ctx.scale(zoomAmount, zoomAmount);
                            ctx.translate(-canvas.width/2, -canvas.height/2);
                            const imgX = (canvas.width / 2) - (img.width / 2) * baseScale;
                            const imgY = (canvas.height / 2) - (img.height / 2) * baseScale;
                            ctx.drawImage(img, imgX, imgY, img.width * baseScale, img.height * baseScale);
                            ctx.restore();
                        }

                        const gradient = ctx.createLinearGradient(0, canvas.height - 300, 0, canvas.height);
                        gradient.addColorStop(0, "transparent");
                        gradient.addColorStop(1, "rgba(0,0,0,0.85)");
                        ctx.fillStyle = gradient;
                        ctx.fillRect(0, canvas.height - 300, canvas.width, 300);

                        ctx.font = `bold 40px sans-serif`;
                        ctx.fillStyle = 'white';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        
                        const words = scene.text.split(' ');
                        let line = '', lines = [];
                        for (let n = 0; n < words.length; n++) {
                            const testLine = line + words[n] + ' ';
                            if (ctx.measureText(testLine).width > canvas.width * 0.8 && n > 0) {
                                lines.push(line); line = words[n] + ' ';
                            } else { line = testLine; }
                        }
                        lines.push(line);
                        
                        const visibleLines = lines.slice(-2);
                        const lineHeight = 50;
                        let startY = canvas.height - 40 - (visibleLines.length - 1) * lineHeight;
                        
                        visibleLines.forEach(l => {
                            ctx.shadowColor = "black"; ctx.shadowBlur = 8; ctx.lineWidth = 4;
                            ctx.strokeText(l, canvas.width / 2, startY);
                            ctx.shadowBlur = 0; ctx.fillText(l, canvas.width / 2, startY);
                            startY += lineHeight;
                        });
                    }, 1000 / 30); 
                });

                recorder.stop();
                const blob = await recordingPromise;
                const url = URL.createObjectURL(blob);
                
                document.getElementById(`preview-area-${idx}`).classList.add('hidden');
                document.getElementById(`video-area-${idx}`).classList.remove('hidden');
                document.getElementById(`video-player-${idx}`).src = url;
                
                actionBtn.disabled = false;
                actionBtn.className = "w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/20 transition-colors text-sm";
                actionBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    ဒေါင်းလုဒ်လုပ်မည်
                `;
                actionBtn.onclick = () => downloadFile(url, `Scene_${idx+1}.webm`);

                voiceSource.disconnect();
                if (sfxSource) { sfxSource.disconnect(); sfxGain.disconnect(); }

            } catch(e) {
                alert("ဖန်တီးမှု မအောင်မြင်ပါ။");
                document.getElementById(`recording-overlay-${idx}`).classList.add('hidden');
                document.getElementById(`recording-overlay-${idx}`).classList.remove('flex');
                document.getElementById(`play-btn-${idx}`).classList.remove('hidden');
                actionBtn.disabled = false;
            }
        }

        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); }, 100);
        }

        function resetApp() {
            document.getElementById('storyInput').value = "";
            scriptDataObj = null;
            generatedScenes = [];
            showView(1);
        }
    </script>
</body>
</html>
